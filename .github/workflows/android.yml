name: Android

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Install CMake and Ninja
        run: |
          python3 -m pip install --user "cmake>=4.3" ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          java -version
          cmake --version
          ninja --version
          sdkmanager --version

      - name: Build release APKs
        run: |
          chmod +x gradlew app/src/*.bash
          ./gradlew --no-daemon :app:assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: shimakaze-android-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
