name: Android

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SHIMAKAZE_KEYSTORE_BASE64: ${{ secrets.SHIMAKAZE_KEYSTORE_BASE64 }}
      SHIMAKAZE_KEYSTORE_PASSWORD: ${{ secrets.SHIMAKAZE_KEYSTORE_PASSWORD }}
      SHIMAKAZE_KEY_ALIAS: ${{ secrets.SHIMAKAZE_KEY_ALIAS }}
      SHIMAKAZE_KEY_PASSWORD: ${{ secrets.SHIMAKAZE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Install CMake and Ninja
        run: |
          python3 -m pip install --user "cmake>=4.3" ninja
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          java -version
          cmake --version
          ninja --version
          sdkmanager --version

      - name: Validate signing secrets
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          missing=0
          for name in \
            SHIMAKAZE_KEYSTORE_BASE64 \
            SHIMAKAZE_KEYSTORE_PASSWORD \
            SHIMAKAZE_KEY_ALIAS \
            SHIMAKAZE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required to build installable signed release APKs"
              missing=1
            fi
          done
          exit "$missing"

      - name: Decode signing keystore
        if: ${{ env.SHIMAKAZE_KEYSTORE_BASE64 != '' }}
        run: |
          keystore_file="$RUNNER_TEMP/shimakaze-release.keystore"
          printf '%s' "$SHIMAKAZE_KEYSTORE_BASE64" | base64 --decode > "$keystore_file"
          echo "SHIMAKAZE_KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"

      - name: Build release APKs
        run: |
          chmod +x gradlew app/src/*.bash
          ./gradlew --no-daemon :app:assembleRelease

      - name: Collect APKs
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          python3 - <<'PY'
          import json
          import shutil
          import sys
          from pathlib import Path

          release_dir = Path("app/build/outputs/apk/release")
          upload_dir = Path("app/build/outputs/apk/upload")
          metadata_file = release_dir / "output-metadata.json"
          expected = {"universal", "armeabi-v7a", "arm64-v8a", "x86", "x86_64"}

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              sys.exit(1)

          def normalize_abi(value):
              normalized = value.lower()
              aliases = {
                  "armeabi": "armeabi-v7a",
                  "armeabi_v7a": "armeabi-v7a",
                  "armeabi-v7a": "armeabi-v7a",
                  "arm64_v8a": "arm64-v8a",
                  "arm64-v8a": "arm64-v8a",
                  "x86": "x86",
                  "x86_64": "x86_64",
              }
              return aliases.get(normalized, normalized)

          def label_from_element(element):
              filters = element.get("filters") or []
              for item in filters:
                  if str(item.get("filterType", "")).upper() == "ABI" and item.get("value"):
                      return normalize_abi(str(item["value"]))

              output_file = str(element.get("outputFile", "")).lower()
              for candidate in ("arm64-v8a", "x86_64", "armeabi-v7a", "armeabi", "x86"):
                  if candidate in output_file:
                      return normalize_abi(candidate)
              return "universal" if "universal" in output_file else None

          if not metadata_file.is_file():
              fail(f"Missing APK metadata: {metadata_file}")

          upload_dir.mkdir(parents=True, exist_ok=True)
          metadata = json.loads(metadata_file.read_text())
          found = set()

          for element in metadata.get("elements", []):
              output_file = element.get("outputFile")
              if not output_file:
                  continue

              label = label_from_element(element)
              if label is None:
                  fail(f"Unable to determine APK label for {output_file}")

              source = release_dir / output_file
              if not source.is_file():
                  fail(f"APK listed in metadata does not exist: {source}")
              if "unsigned" in source.name:
                  fail(f"Unsigned APK was produced instead of a signed release APK: {source}")

              target = upload_dir / f"shimakaze-{label}-release.apk"
              shutil.copy2(source, target)
              found.add(label)
              print(f"Prepared {target}")

          missing = expected - found
          extra = found - expected
          if missing or extra:
              fail(f"Unexpected APK set. Missing: {sorted(missing)}; extra: {sorted(extra)}")
          PY

      - name: Verify signed APKs
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          shopt -s nullglob
          apks=(app/build/outputs/apk/upload/*.apk)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "::error::No APKs were collected for signing verification"
            exit 1
          fi

          for apk in "${apks[@]}"; do
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$apk"
          done

      - name: Upload universal APK
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v6
        with:
          name: shimakaze-universal-release-apk
          path: app/build/outputs/apk/upload/shimakaze-universal-release.apk
          if-no-files-found: error
          compression-level: 0

      - name: Upload armeabi-v7a APK
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v6
        with:
          name: shimakaze-armeabi-v7a-release-apk
          path: app/build/outputs/apk/upload/shimakaze-armeabi-v7a-release.apk
          if-no-files-found: error
          compression-level: 0

      - name: Upload arm64-v8a APK
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v6
        with:
          name: shimakaze-arm64-v8a-release-apk
          path: app/build/outputs/apk/upload/shimakaze-arm64-v8a-release.apk
          if-no-files-found: error
          compression-level: 0

      - name: Upload x86 APK
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v6
        with:
          name: shimakaze-x86-release-apk
          path: app/build/outputs/apk/upload/shimakaze-x86-release.apk
          if-no-files-found: error
          compression-level: 0

      - name: Upload x86_64 APK
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v6
        with:
          name: shimakaze-x86_64-release-apk
          path: app/build/outputs/apk/upload/shimakaze-x86_64-release.apk
          if-no-files-found: error
          compression-level: 0
